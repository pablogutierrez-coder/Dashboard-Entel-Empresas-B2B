}

function getDateMs(value){
  const date = parseAppDate(value);
  return date ? date.getTime() : 0;
}

function isWithinDateRange(value, dateFrom, dateTo){
  const timestamp = getDateMs(value);
  if (!timestamp) return !dateFrom && !dateTo;
  if (dateFrom) {
    const start = new Date(dateFrom + "T00:00:00").getTime();
    if (timestamp < start) return false;
  }
  if (dateTo) {
    const end = new Date(dateTo + "T23:59:59").getTime();
    if (timestamp > end) return false;
  }
  return true;
}

function getPeriodKey(value){
  const date = parseAppDate(value);
  if (!date) return "";
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}`;
}

function getMonthWeekPeriodKey(value){
  const date = parseAppDate(value);
  if (!date) return "";
  const week = Math.min(4, Math.max(1, Math.ceil(date.getDate() / 7)));
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-S${week}`;
}

function formatPeriodLabel(key){
  if (!key) return "-";
  const parts = String(key).split("-");
  const year = Number(parts[0] || 0);
  const month = Number(parts[1] || 1);
  const date = new Date(year, month - 1, 1);
  if (isNaN(date.getTime())) return key;
  if (parts[2]) {
    const monthText = date.toLocaleDateString("es-PE",{month:"long"});
    const monthLabel = monthText.charAt(0).toUpperCase() + monthText.slice(1);
    return `${monthLabel} ${parts[2]}`;
  }
  return date.toLocaleDateString("es-PE",{month:"short",year:"numeric"});
}

function buildEvaluationScoreSeries(sectionRows){
  const grouped = grp(sectionRows || [], row => String(row.evaluationId || row.feedbackId || ""));
  return Object.values(grouped).map(rows => {
    const reference = rows[0] || {};
    const finalScore = Number(reference.finalScore);
    const score = !isNaN(finalScore) ? finalScore : averageNumeric(rows.map(row => scoreFromResult(row.resultado)));
    const noCumpleCount = rows.filter(row => isNoCumpleValue(row.resultadoRaw ?? row.resultado)).length;
    const cumpleCount = rows.filter(row => normalizeResultValue(row.resultado) === "CUMPLE").length;
    return {
      evaluationId: reference.evaluationId,
      feedbackId: reference.feedbackId,
      date: reference.date,
      label: formatFeedbackDate(reference.date),
      score,
      noCumpleCount,
      cumpleCount
    };
  }).filter(item => item.date).sort((a,b)=>getDateMs(a.date)-getDateMs(b.date));
}

function buildIndicatorOutcomeCounts(sectionRows){
  const grouped = grp((sectionRows || []).filter(row => !isSyntheticGeneralAttribute(row)), row => getQualityAttributeName(row) || "Sin indicador");
  return Object.entries(grouped).map(([indicator,rows]) => ({
    indicator,
    noCumple: rows.filter(row => isNoCumpleValue(row.resultadoRaw ?? row.resultado)).length,
    cumple: rows.filter(row => normalizeResultValue(row.resultado) === "CUMPLE").length,
    noAplica: rows.filter(row => normalizeResultValue(row.resultado) === "NO APLICA").length,
    total: rows.length
  })).sort((a,b)=>b.noCumple-a.noCumple || b.total-a.total);
}

function getQualityAttributeName(row){
  const candidates = [
    row?.atributo,
    row?.atributoCalidad,
    row?.item,
    row?.itemCalidad,
    row?.criterio,
    row?.pregunta,
    row?.nombreAtributo,
    row?.factor,
    row?.categoria,
    row?.dimension,
    row?.indicador,
    row?.nombreSeccion,
    row?.subItem
  ];
  return String(candidates.find(value => String(value || "").trim()) || "").trim();
}

function isSyntheticGeneralAttribute(row){
  const attribute = normalizeComparableValue(getQualityAttributeName(row));
  return attribute === "resultado general" || row?.syntheticGeneral === true;
}

function buildParetoByAttribute(sectionRows){
  const records = sectionRows || [];
  const rowsWithAttribute = records.filter(row => !isSyntheticGeneralAttribute(row) && getQualityAttributeName(row));
  const rows = rowsWithAttribute.filter(row =>
    isNoCumpleValue(row?.resultadoRaw ?? row?.resultado) &&
    !isSyntheticGeneralAttribute(row) &&
    getQualityAttributeName(row)
  );
  const total = rows.length;
  if (!total) {
    logParetoDiagnostics(records, rowsWithAttribute, rows, []);
    return [];
  }
  const grouped = grp(rows, row => getQualityAttributeName(row));
  let cumulative = 0;
  const paretoRows = Object.entries(grouped)
    .map(([attribute,items]) => ({attribute,count:items.length}))
    .sort((a,b)=>b.count-a.count || a.attribute.localeCompare(b.attribute, "es"))
    .map(item => {
      cumulative += item.count;
      return {
        ...item,
        individualPct: total ? item.count / total * 100 : 0,
        cumulativePct: total ? cumulative / total * 100 : 0
      };
    });
  logParetoDiagnostics(records, rowsWithAttribute, rows, paretoRows);
  return paretoRows;
}

function getUniqueSample(values, limit){
  return [...new Set((values || []).map(value => String(value ?? "").trim()).filter(Boolean))].slice(0, limit || 20);
}

function logParetoDiagnostics(records, rowsWithAttribute, noCumpleRows, paretoRows){
  if (typeof console === "undefined") return;
  const sampleRecords = (records || []).slice(0, 5);
  const resultValues = getUniqueSample((records || []).map(row => row?.resultadoRaw ?? row?.resultado), 30);
  const attributeValues = getUniqueSample((records || []).map(getQualityAttributeName), 30);
  const dates = getUniqueSample((records || []).map(row => row?.date), 20);
  const payload = {
    totalRegistrosRecibidos: (records || []).length,
    camposDisponiblesMuestra: sampleRecords.map(row => Object.keys(row || {})),
    valoresResultadoUnicos: resultValues,
    valoresAtributoUnicos: attributeValues,
    fechasDisponibles: dates,
    registrosConAtributoDespuesFiltroFecha: (rowsWithAttribute || []).length,
    registrosNoCumple: (noCumpleRows || []).length,
    atributosPareto: (paretoRows || []).map(row => `${row.attribute}: ${row.count}`)
  };
  console.info("[Pareto diagnostico]", payload);
  if (!(noCumpleRows || []).length) {
    console.warn("No se encontraron valores compatibles con No cumple. Valores encontrados:", resultValues);
  }
}

function buildReincidenceRows(sectionRows){
  const grouped = grp((sectionRows || []).filter(row => isNoCumpleValue(row.resultadoRaw ?? row.resultado)), row => `${normalizeName(row.advisorName)}||${row.indicador || row.criterio}`);
  return Object.values(grouped).map(rows => {
    const first = rows[0] || {};
    return {
      advisorName: first.advisorName || "-",
      supervisor: first.supervisor || "-",
      campaign: first.campaign || "-",
      indicator: first.indicador || first.criterio || "Sin indicador",
      count: rows.length,
      lastDate: [...rows].sort((a,b)=>getDateMs(b.date)-getDateMs(a.date))[0]?.date || ""
    };
  }).filter(item => item.count > 1).sort((a,b)=>b.count-a.count || getDateMs(b.lastDate)-getDateMs(a.lastDate));
}

function buildRecoveredIndicators(sectionRows){
  const grouped = grp(sectionRows || [], row => `${normalizeName(row.advisorName)}||${row.indicador || row.criterio}`);
  const recovered = [];
  Object.values(grouped).forEach(rows => {
    const ordered = [...rows].sort((a,b)=>getDateMs(a.date)-getDateMs(b.date));
    const hadNoCumple = ordered.some(row => isNoCumpleValue(row.resultadoRaw ?? row.resultado));
    const latest = ordered[ordered.length - 1];
    if (hadNoCumple && normalizeResultValue(latest?.resultado) === "CUMPLE") {
      recovered.push({
        advisorName: latest.advisorName || "-",
        indicator: latest.indicador || latest.criterio || "Sin indicador",
        supervisor: latest.supervisor || "-",
        campaign: latest.campaign || "-",
        date: latest.date || ""
      });
    }
  });
  return recovered;
}

function buildObservationCounts(sectionRows){
  const grouped = {};
  (sectionRows || []).forEach(row => {
    const text = String(row.oportunidadMejora || row.detalleAuditado || row.indicador || "").trim();
    if (!text) return;
    const key = text.length > 120 ? text.slice(0,117) + "..." : text;
    if (!grouped[key]) grouped[key] = {label:key,count:0};
    grouped[key].count += 1;
  });
  return Object.values(grouped).sort((a,b)=>b.count-a.count);
}

function buildTrendByPeriod(sectionRows){
  const grouped = grp(sectionRows || [], row => getMonthWeekPeriodKey(row.date));
  return Object.entries(grouped).filter(([key])=>!!key).map(([period,rows]) => {
    const evaluationRows = Object.values(grp(rows, row => String(row.evaluationId || row.feedbackId || ""))).map(group => group[0]).filter(Boolean);
    const scores = evaluationRows.map(row => Number(row.finalScore)).filter(value => !isNaN(value));
    return {
      period,
      label: formatPeriodLabel(period),
      score: averageNumeric(scores),
      evaluationCount: scores.length,
      noCumple: rows.filter(row => isNoCumpleValue(row.resultadoRaw ?? row.resultado)).length,
      cumple: rows.filter(row => normalizeResultValue(row.resultado) === "CUMPLE").length
    };
  }).sort((a,b)=>String(a.period).localeCompare(String(b.period)));
}

function getManagementCounter(rows, typeName){
  const target = normalizeComparableValue(typeName);
  return (rows || []).filter(row => normalizeComparableValue(row.tipoGestion) === target).length;
}

function getLatestFeedbackRow(rows){
  return [...(rows || [])].sort((a,b)=>getDateMs(b.feedbackDate)-getDateMs(a.feedbackDate))[0] || null;
}

function buildAdvisorInsight(feedbackRows, sectionRows){
  if (!feedbackRows.length) return null;
  const latest = getLatestFeedbackRow(feedbackRows);
  const scoreSeries = buildEvaluationScoreSeries(sectionRows);
  const weeklyTrend = buildTrendByPeriod(sectionRows);
  const firstScore = scoreSeries[0]?.score ?? null;
  const lastScore = scoreSeries[scoreSeries.length - 1]?.score ?? null;
  const delta = firstScore !== null && lastScore !== null ? lastScore - firstScore : null;
  const reincidences = buildReincidenceRows(sectionRows).filter(row => normalizeName(row.advisorName) === normalizeName(latest?.advisorName));
  const recoveredIndicators = buildRecoveredIndicators(sectionRows).filter(row => normalizeName(row.advisorName) === normalizeName(latest?.advisorName));
  const observationCounts = buildObservationCounts(sectionRows);
  const criticalIndicators = buildIndicatorOutcomeCounts(sectionRows).filter(item => item.noCumple > 0);
  const quartile = latest?.quartile || getQuartileFromScore(lastScore);
  const openCommitments = feedbackRows.filter(row => row.compromisoMejora && row.estado !== "closed").length;
  const closedCommitments = feedbackRows.filter(row => row.compromisoMejora && row.estado === "closed").length;
  return {
    advisorName: latest?.advisorName || "-",
    supervisor: latest?.supervisor || "-",
    campaign: latest?.campaign || "-",
    fechaIngreso: latest?.fechaIngreso || "-",
    quartile,
    quartileColor: getQuartileColor(quartile),
    evaluationCount: feedbackRows.length,
    feedbackCount: getManagementCounter(feedbackRows, "Feedback"),
    reinforcementCount: getManagementCounter(feedbackRows, "Refuerzo"),
    clinicCount: getManagementCounter(feedbackRows, "Clinica de calidad"),
    badPracticeCount: getManagementCounter(feedbackRows, "Mala practica"),
    latestFeedbackDate: latest?.feedbackDate || "",
    currentStatus: latest?.estado || "pending",
    currentStatusLabel: getStatusLabel(latest?.estado),
    scoreSeries,
    weeklyTrend,
    firstScore,
    lastScore,
    delta,
    reincidences,
    recoveredIndicators,
    criticalIndicators,
    observationCounts,
    openCommitments,
    closedCommitments
  };
}

function buildAdvisorStatusLabel(insight){
  if (!insight) return "Sin datos";
  if ((insight.reincidences || []).length > 0) return "Reincidente";
  if ((insight.delta || 0) > 0) return "En mejora";
  if (normalizeComparableValue(insight.currentStatus) === "in_follow_up") return "En seguimiento";
  if (normalizeComparableValue(insight.currentStatus) === "closed") return "Cerrado";
  return "Estable";
}

function buildAdvisorTableRows(feedbackRows, sectionRows){
  const byAdvisor = grp(feedbackRows || [], row => normalizeName(row.advisorName));
  return Object.values(byAdvisor).map(rows => {
    const advisorName = rows[0]?.advisorName || "-";
    const advisorSections = (sectionRows || []).filter(section => normalizeName(section.advisorName) === normalizeName(advisorName));
    const insight = buildAdvisorInsight(rows, advisorSections);
    return {
      advisorName,
      supervisor: rows[0]?.supervisor || "-",
      campaign: rows[0]?.campaign || "-",
      quartile: insight?.quartile || "",
      quartileColor: insight?.quartileColor || "#64748b",
      latestScore: insight?.lastScore,
      delta: insight?.delta,
      state: buildAdvisorStatusLabel(insight),
      currentStatusLabel: insight?.currentStatusLabel || "-",
      reincidences: insight?.reincidences?.length || 0,
      feedbackCount: rows.length
    };
  }).sort((a,b)=>(b.latestScore ?? -1)-(a.latestScore ?? -1));
}

function buildTeamInsight(feedbackRows, sectionRows, noTipificationRows){
  if (!feedbackRows.length) return null;
  const evaluationRows = (feedbackRows || []).filter(row => row.sourceType === "evaluation");
  const advisorTable = buildAdvisorTableRows(feedbackRows, sectionRows, noTipificationRows);
  const criticalIndicators = buildIndicatorOutcomeCounts(sectionRows);
  const paretoErrors = buildParetoByAttribute(sectionRows);
  const recovered = buildRecoveredIndicators(sectionRows);
  const trend = buildTrendByPeriod(sectionRows);
  const noTipificationTrend = buildNoTipificationTrend(noTipificationRows);
  const noTipificationByAdvisor = buildNoTipificationByAdvisor(noTipificationRows);
  const latestByAdvisor = Object.values(grp(feedbackRows,row=>normalizeName(row.advisorName))).map(rows => getLatestFeedbackRow(rows)).filter(Boolean);
  const totalAdvisors = advisorTable.length;
  const advisorsInFollowUp = latestByAdvisor.filter(row => normalizeComparableValue(row.estado) === "in_follow_up").length;
  const advisorsImproving = advisorTable.filter(row => (row.delta || 0) > 0).length;
  const advisorsReincidents = advisorTable.filter(row => row.reincidences > 0).length;
  const qDistribution = advisorTable.reduce((acc,row)=>{
    const key = row.quartile || "Sin dato";
    acc[key] = (acc[key] || 0) + 1;
    return acc;
  },{});
  const closureDays = feedbackRows.map(row => {
    if (normalizeComparableValue(row.estado) !== "closed") return null;
    const start = getDateMs(row.feedbackDate);
    const end = getDateMs(row.closedAt || row.updatedAt || row.lastActionDate);
    return start && end ? (end - start) / 86400000 : null;
  }).filter(value => typeof value === "number" && !isNaN(value));
  return {
    supervisor: feedbackRows[0]?.supervisor || "",
    campaign: feedbackRows[0]?.campaign || "",
    totalAdvisors,
    totalEvaluations: evaluationRows.length,
    totalFeedbacks: feedbackRows.length,
    totalReinforcements: getManagementCounter(feedbackRows, "Refuerzo"),
    totalClinics: getManagementCounter(feedbackRows, "Clinica de calidad"),
    totalBadPractices: getManagementCounter(feedbackRows, "Mala practica"),
    totalFeedbackType: getManagementCounter(feedbackRows, "Feedback"),
    totalNoTipification: (noTipificationRows || []).length,
    criticalIndicators,
    paretoErrors,
    recoveredIndicators: Object.entries(grp(recovered, item => item.indicator)).map(([indicator,rows]) => ({indicator,count:rows.length})).sort((a,b)=>b.count-a.count),
    advisorTable,
    rankingTable: advisorTable,
    noTipificationByAdvisor,
    noTipificationTrend,
    reincidenceTable: buildReincidenceRows(sectionRows),
    qDistribution,
    followUpPct: totalAdvisors ? advisorsInFollowUp / totalAdvisors * 100 : 0,
    improvementPct: totalAdvisors ? advisorsImproving / totalAdvisors * 100 : 0,
    reincidencePct: totalAdvisors ? advisorsReincidents / totalAdvisors * 100 : 0,
    trend,
    generalCompliance: averageNumeric(feedbackRows.map(row => Number(row.score)).filter(value => !isNaN(value))),
    closedFeedbacks: feedbackRows.filter(row => normalizeComparableValue(row.estado) === "closed").length,
    pendingFeedbacks: feedbackRows.filter(row => normalizeComparableValue(row.estado) !== "closed").length,
    avgClosureDays: averageNumeric(closureDays)
  };
}

function buildImprovementDataset({currentUser,feedbackRecords,evaluationRecords,staffing,historico,users}){
  const quartileLookup = getQuartileLookup(historico);
  const evaluationsByFeedback = {};
  (evaluationRecords || []).forEach(item => {
    evaluationsByFeedback[Number(item.feedbackId)] = item;
  });

  const baseFeedbackRows = (feedbackRecords || []).filter(record => {
    const role = String(currentUser?.rol || "").trim().toLowerCase();
    return ["admin","analista","supervisor"].includes(role);
  }).map(record => {
    const evaluation = evaluationsByFeedback[Number(record.id)] || null;
    const advisorName = record.asesorNombre || record.assessor || "-";
    const supervisor = getSupervisorForAdvisor(staffing, advisorName);
    const campaign = getAdvisorCampaign(advisorName, staffing, users, record, evaluation);
    const staffingItem = (staffing || []).find(item => normalizeName(item?.asesor) === normalizeName(advisorName));
    const sectionScores = Array.isArray(evaluation?.secciones) ? evaluation.secciones.map(section => scoreFromResult(section.resultado)) : [];
    const derivedScore = averageNumeric(sectionScores);
    const snapshotQuartile = quartileLookup[normalizeName(advisorName)]?.quartile || "";
    const quartile = snapshotQuartile || getQuartileFromScore(derivedScore);
    return {
      ...record,
      advisorName,
      supervisor,
      campaign,
      fechaIngreso: staffingItem?.fechaIngreso || "",
      evaluation,
      estado: record?.estado || record?.status || "pending",
      feedbackDate: record?.feedbackDate || record?.createdAt || evaluation?.fechaEvaluacion || "",
      score: derivedScore,
      quartile,
      quartileScore: quartileLookup[normalizeName(advisorName)]?.score ?? derivedScore,
      lastActionDate: record?.updatedAt || record?.advisorAcceptedAt || record?.fechaVisualizacionAsesor || record?.feedbackDate || record?.createdAt || "",
      closedAt: record?.updatedAt || "",
      compromisoMejora: record?.compromisoMejora || evaluation?.compromisoMejora || "",
      observacionGeneral: record?.observacionGeneral || evaluation?.observacionGeneral || record?.feedbackText || ""
    };
  });

  const sectionRows = [];
  baseFeedbackRows.forEach(row => {
    const sections = Array.isArray(row.evaluation?.secciones) ? row.evaluation.secciones : [];
    sections.forEach((section,index) => {
      sectionRows.push({
        feedbackId: row.id,
        evaluationId: row.evaluation?.id || `feedback-${row.id}`,
        advisorName: row.advisorName,
        supervisor: row.supervisor,
        campaign: row.campaign,
        fechaIngreso: row.fechaIngreso,
        quartile: row.quartile,
        tipoGestion: row.tipoGestion || row.feedbackCategory || "",
        clasificacionFeedback: row.clasificacionFeedback || "",
        tipoRefuerzo: row.tipoRefuerzo || "",
        estado: row.estado,
        date: row.evaluation?.fechaEvaluacion || row.feedbackDate || row.createdAt || "",
        finalScore: row.score,
        indicador: section.nombreSeccion || section.criterio || `Seccion ${index + 1}`,
        criterio: section.criterio || "",
        resultado: normalizeResultValue(section.resultado),
        detalleAuditado: section.detalleAuditado || "",
        oportunidadMejora: section.oportunidadMejora || "",
        evidencia: section.evidencia || "",
        puntaje: Number(section.puntaje || 0) || 0
      });
    });
  });

  return {feedbackRows: baseFeedbackRows, sectionRows};
}

function applyImprovementFilters(dataset, filters){
  const commonFeedbackMatch = row => {
    if (!isWithinDateRange(row.feedbackDate || row.lastActionDate, filters.dateFrom, filters.dateTo)) return false;
    if (filters.advisor && row.advisorName !== filters.advisor) return false;
    if (filters.supervisor && row.supervisor !== filters.supervisor) return false;
    if (filters.campaign && row.campaign !== filters.campaign) return false;
    if (filters.tipoGestion && row.tipoGestion !== filters.tipoGestion) return false;
    if (filters.clasificacionFeedback && row.clasificacionFeedback !== filters.clasificacionFeedback) return false;
    if (filters.tipoRefuerzo && row.tipoRefuerzo !== filters.tipoRefuerzo) return false;
    if (filters.estado && row.estado !== filters.estado) return false;
    if (filters.cuartil && row.quartile !== filters.cuartil) return false;
    return true;
  };

  const commonSectionMatch = row => {
    if (!isWithinDateRange(row.date, filters.dateFrom, filters.dateTo)) return false;
    if (filters.advisor && row.advisorName !== filters.advisor) return false;
    if (filters.supervisor && row.supervisor !== filters.supervisor) return false;
    if (filters.campaign && row.campaign !== filters.campaign) return false;
    if (filters.tipoGestion && row.tipoGestion !== filters.tipoGestion) return false;
    if (filters.clasificacionFeedback && row.clasificacionFeedback !== filters.clasificacionFeedback) return false;
    if (filters.tipoRefuerzo && row.tipoRefuerzo !== filters.tipoRefuerzo) return false;
    if (filters.estado && row.estado !== filters.estado) return false;
    if (filters.cuartil && row.quartile !== filters.cuartil) return false;
    if (filters.indicador && (row.indicador || row.criterio) !== filters.indicador) return false;
    if (filters.resultado && normalizeResultValue(row.resultado) !== normalizeResultValue(filters.resultado)) return false;
    return true;
  };

  const filteredSectionRows = (dataset.sectionRows || []).filter(commonSectionMatch);
  const sectionFeedbackIds = new Set(filteredSectionRows.map(row => Number(row.feedbackId)));
  const needsSectionRestriction = Boolean(filters.indicador || filters.resultado);
  const filteredFeedbackRows = (dataset.feedbackRows || []).filter(row => {
    if (!commonFeedbackMatch(row)) return false;
    if (needsSectionRestriction) return sectionFeedbackIds.has(Number(row.id));
    return true;
  });
  const feedbackIds = new Set(filteredFeedbackRows.map(row => Number(row.id)));
  return {
    feedbackRows: filteredFeedbackRows,
    sectionRows: filteredSectionRows.filter(row => feedbackIds.has(Number(row.feedbackId)))
  };
}

function getTrendComparison(trendRows, basePeriod, comparedPeriod){
  const byPeriod = {};
  (trendRows || []).forEach(item => {
    if (item?.period) byPeriod[item.period] = item;
  });
  const base = byPeriod[basePeriod] || null;
  const compared = byPeriod[comparedPeriod] || null;
  const difference = base && compared && typeof base.score === "number" && typeof compared.score === "number"
    ? compared.score - base.score
    : null;
  return {base,compared,difference};
}

function buildHistoricalParetoFromSnapshots(historico, filters){
  const snapshots = (historico || [])
    .filter(snapshot => Array.isArray(snapshot?.data?.pareto) && snapshot.data.pareto.length)
    .filter(snapshot => isWithinDateRange(snapshot.timestamp || snapshot.createdAt || snapshot.id, filters?.dateFrom || "", filters?.dateTo || ""))
    .sort((a,b)=>getDateMs(b.timestamp || b.createdAt || b.id)-getDateMs(a.timestamp || a.createdAt || a.id));
  const selected = snapshots[0] || null;
  if (!selected) return [];
  const total = selected.data.pareto.reduce((sum,item)=>sum + Number(item.count || item.noCumple || 0), 0);
  let cumulative = 0;
  const rows = selected.data.pareto
    .map(item => ({attribute:String(item.factor || item.attribute || item.indicator || item.atributo || "").trim(),count:Number(item.count || item.noCumple || 0) || 0}))
    .filter(item => item.attribute && normalizeComparableValue(item.attribute) !== "resultado general" && item.count > 0)
    .sort((a,b)=>b.count-a.count || a.attribute.localeCompare(b.attribute, "es"))
    .map(item => {
      cumulative += item.count;
      return {
        ...item,
        individualPct: total ? item.count / total * 100 : 0,
        cumulativePct: total ? cumulative / total * 100 : 0,
        source: "snapshot",
        snapshotName: selected.name || selected.data?.name || ""
      };
    });
  if (typeof console !== "undefined") {
    console.info("[Pareto diagnostico] respaldo snapshots_shared", {
      snapshot: selected.name || selected.data?.name || selected.id,
      timestamp: selected.timestamp,
      totalAtributos: rows.length,
      totalErrores: total,
      atributosPareto: rows.slice(0, 10).map(row => `${row.attribute}: ${row.count}`)
    });
  }
  return rows;
}

        loadImprovementCoreData("precarga_independiente")

        setUsers([{nombre:"Pablo", usuario:"Pablo.gutierrez", password:"3100", rol:"admin"}]);

          console.info("[Usuarios diagnostico]", {
            usuariosCargados: bootstrapUsers.length,
            erroresBootstrap: bootstrap.errors || {},
            muestra: bootstrapUsers.slice(0, 20).map(u => ({
              usuario: String(u?.usuario || "").trim(),
              nombre: String(u?.nombre || "").trim(),
              rol: String(u?.rol || "").trim(),

          });
          if (bootstrapUsers.length) setUsers(bootstrapUsers);
          let historicoData = Array.isArray(bootstrap.historico) ? bootstrap.historico : [];
          let staffingData = Array.isArray(bootstrap.staffing) ? bootstrap.staffing : [];
          let feedbackData = Array.isArray(bootstrap.feedbackRecords) ? bootstrap.feedbackRecords : [];
          let evaluationData = Array.isArray(bootstrap.evaluationRecords) ? bootstrap.evaluationRecords : [];
          let noTipificationData = Array.isArray(bootstrap.noTipificationRecords) ? bootstrap.noTipificationRecords : [];
          let legendData = Array.isArray(bootstrap.legendConcepts) ? bootstrap.legendConcepts : [];

          console.info("[EVALUACIONES_TRANSFORMADAS]", "Bootstrap recibido", {
            historico: historicoData.length,
            staffing: staffingData.length,
            feedbackRecords: feedbackData.length,
            evaluationRecords: evaluationData.length,
            noTipificationRecords: noTipificationData.length,
            errors: bootstrap.errors || {}
          });

          if (!evaluationData.length || !staffingData.length) {
            const fallbackData = await loadImprovementCoreData(!evaluationData.length ? "bootstrap_sin_evaluaciones" : "bootstrap_sin_staffing");
            historicoData = historicoData.length ? historicoData : fallbackData.historico;
            staffingData = staffingData.length ? staffingData : fallbackData.staffing;
            feedbackData = feedbackData.length ? feedbackData : fallbackData.feedbackRecords;
            evaluationData = evaluationData.length ? evaluationData : fallbackData.evaluationRecords;
            noTipificationData = noTipificationData.length ? noTipificationData : fallbackData.noTipificationRecords;
            legendData = legendData.length ? legendData : fallbackData.legendConcepts;
          }

          setHistorico(historicoData);
          setFeedbackRecords(feedbackData);
          setEvaluationRecords(evaluationData);
          setEvaluationsLoading(false);
          setNoTipificationRecords(noTipificationData);
          setLegendConcepts(legendData);
          setCommunicationRecords(Array.isArray(bootstrap.communications) ? bootstrap.communications : []);
          setChatMessages(Array.isArray(bootstrap.chatMessages) ? bootstrap.chatMessages : []);
          const loadedStaffing = staffingData;
          if (loadedStaffing.length) {
            setStaffing(loadedStaffing);
          } else {
            setStaffing(DEMO_STAFF);
            await saveStaffing(DEMO_STAFF);
          }
          return;
        }
        const fallbackData = await loadImprovementCoreData("bootstrap_nulo");
        setHistorico(fallbackData.historico);
        setFeedbackRecords(fallbackData.feedbackRecords);
        setEvaluationRecords(fallbackData.evaluationRecords);
        setEvaluationsLoading(false);
        setNoTipificationRecords(fallbackData.noTipificationRecords);
        setLegendConcepts(fallbackData.legendConcepts);
        const loadedStaffing = fallbackData.staffing;
        if (loadedStaffing.length) {
          setStaffing(loadedStaffing);
        } else {
          setStaffing(DEMO_STAFF);
          await saveStaffing(DEMO_STAFF);
        }
      } catch (err) {
        const message = err?.message || "No se pudo cargar todos los datos de la plataforma.";
        setBootstrapError(message);
        console.error("[Bootstrap parcial]", err);
        const fallbackData = await loadImprovementCoreData("bootstrap_error");
        setHistorico(fallbackData.historico);
        setFeedbackRecords(fallbackData.feedbackRecords);
        setEvaluationRecords(fallbackData.evaluationRecords);
        setEvaluationsLoading(false);
        setNoTipificationRecords(fallbackData.noTipificationRecords);
        setLegendConcepts(fallbackData.legendConcepts);
        if (fallbackData.staffing.length) {
          setStaffing(fallbackData.staffing);
        } else {
          setStaffing(DEMO_STAFF);
        }
      }
    })();
  }, []);

  useEffect(() => {
    (async() => {
      if (!currentUser?.usuario) {
        setNotifications([]);
        setChatMessages([]);
        setCommunicationRecords([]);
        return;
      }
      const data = await loadNotifications(currentUser.usuario);
      const chatData = await loadInternalChatMessages();
      const communicationData = await loadCommunications({currentUser,includeArchived:canManageCommunications(currentUser),includeExpired:canManageCommunications(currentUser)});
      setNotifications(data);
      setChatMessages(chatData);
      setCommunicationRecords(communicationData);
    })();
  }, [currentUser]);

  useEffect(() => {
    if (!currentUser?.usuario) return;
    const timer = setInterval(() => {
      loadNotifications(currentUser.usuario).then(setNotifications).catch(()=>{});
    }, 20000);
    return ()=>clearInterval(timer);
  }, [currentUser]);

  useEffect(() => {
    if (!currentUser?.usuario) return;
    const timer = setInterval(() => {
      loadInternalChatMessages().then(setChatMessages).catch(()=>{});
    }, 12000);
    return ()=>clearInterval(timer);
  }, [currentUser]);

  useEffect(() => {
    if (!evaluationsLoading) return;
    const timer = setTimeout(() => {
      setEvaluationsLoading(false);
      setBootstrapError(prev => prev || "La carga de evaluaciones demoro demasiado. Se muestran los datos disponibles.");
      console.warn("[EVALUACIONES_TIMEOUT_UI_RELEASE]", "Se libero la vista por timeout visual.");
    }, 30000);
    return () => clearTimeout(timer);
  }, [evaluationsLoading]);

  const notify = (type,msg) => {
    setToast({type,msg});
    setTimeout(()=>setToast(null),3000);
  };

  const agregarAlHistorico = async(snapshotData) => {
    const saved = await saveSnapshot(currentUser.nombre,snapshotData);
    if (!saved) return false;
    setHistorico(await loadSnapshots());
    return true;
  };

  const eliminarDelHistorico = async(id) => {
    const deleted = await deleteSnapshot(id);
    if (!deleted) return false;
    setHistorico(await loadSnapshots());
    return true;
  };

  const agregarUsuario = async(nuevoUsuario) => {
    const normalizedNewUser = normalizeUserRecord(nuevoUsuario);
    if (!normalizedNewUser) return false;
    const latestUsers = await loadUsers().catch(() => []);
    const sourceUsers = normalizeUsersList([...(latestUsers || []), ...(users || [])]);
    if (sourceUsers.some(user => normalizeLoginKey(user.usuario) === normalizeLoginKey(normalizedNewUser.usuario))) {
      notify("e","Ese usuario ya existe en la base.");
      setUsers(sourceUsers);
      return false;
    }
    if (normalizedNewUser.rol === "asesor" && normalizedNewUser.assessorName && sourceUsers.some(user => user.rol === "asesor" && normalizeName(user.assessorName) === normalizeName(normalizedNewUser.assessorName))) {
      notify("e","Ese asesor ya tiene un usuario asignado en la base.");
      setUsers(sourceUsers);
      return false;
    }
    const updated = normalizeUsersList([...sourceUsers, normalizedNewUser]);
    let nextStaffing = staffing;
    if (normalizedNewUser.rol === "asesor" && normalizedNewUser.assessorName) {
      nextStaffing = staffing.map(item => normalizeName(item?.asesor) === normalizeName(normalizedNewUser.assessorName) ? {...item,usuarioAsignado:normalizedNewUser.usuario} : item);
    }
    const saved = await saveUsers(updated);
    if (saved === false) return false;
    if (nextStaffing !== staffing) {
      const staffingSaved = await saveStaffing(nextStaffing);
      if (staffingSaved === false) return false;
      setStaffing(nextStaffing);
    }
    setUsers(updated);
    return true;
  };

  const eliminarUsuario = async(usuario) => {
    const latestUsers = await loadUsers().catch(() => users);
    const normalizedUserKey = normalizeLoginKey(usuario);
    const normalizedSource = normalizeUsersList(latestUsers && latestUsers.length ? latestUsers : users);
    const userToDelete = normalizedSource.find(u => normalizeLoginKey(u.usuario) === normalizedUserKey);
    const updated = normalizedSource.filter(u => normalizeLoginKey(u.usuario) !== normalizedUserKey);
    let nextStaffing = staffing;
    if (userToDelete?.rol === "asesor") {
      nextStaffing = staffing.map(item => normalizeLoginKey(item?.usuarioAsignado) === normalizedUserKey ? {...item,usuarioAsignado:""} : item);
    }
    const saved = await saveUsers(updated);
    if (saved === false) return false;
    if (nextStaffing !== staffing) {
      const staffingSaved = await saveStaffing(nextStaffing);
      if (staffingSaved === false) return false;
      setStaffing(nextStaffing);
    }
    setUsers(updated);
    return true;
  };

  const actualizarEstadoUsuario = async(usuario, estado) => {
    const nextStatus = normalizeProfileStatus(estado || "activo");
    const latestUsers = await loadUsers().catch(() => users);
    const normalizedUserKey = normalizeLoginKey(usuario);
    const normalizedSource = normalizeUsersList(latestUsers && latestUsers.length ? latestUsers : users);
    const targetUser = normalizedSource.find(u => normalizeLoginKey(u.usuario) === normalizedUserKey);
    if (!targetUser) {
      notify("e","No se encontro el usuario para actualizar estado.");
      return false;
    }
    const updated = normalizedSource.map(u => normalizeLoginKey(u.usuario) === normalizedUserKey ? {...u, estado: nextStatus} : u);
    let nextStaffing = staffing;
    if (targetUser?.rol === "asesor") {
      nextStaffing = staffing.map(item => {
        const matchesUser = normalizeLoginKey(item?.usuarioAsignado) === normalizedUserKey;
        const matchesAdvisor = normalizeName(item?.asesor) === normalizeName(targetUser?.assessorName || targetUser?.nombre);
        return matchesUser || matchesAdvisor ? {...item, estado: nextStatus, usuarioAsignado: item?.usuarioAsignado || targetUser.usuario} : item;
      });
    }
    const saved = await saveUsers(updated);
    if (saved === false) { notify("e","No se pudo actualizar el estado del usuario."); return false; }
    if (nextStaffing !== staffing) {
      const staffingSaved = await saveStaffing(nextStaffing);
      if (staffingSaved === false) { notify("e","Usuario actualizado, pero no se pudo sincronizar dotacion."); return false; }
      setStaffing(nextStaffing);
    }
    setUsers(updated);
    notify("s", nextStatus === "cesado" ? "Usuario cesado. Ya no podra ingresar." : "Usuario activado.");
    return true;
  };

  const resetearContrasenaUsuario = async(usuario, nuevaContrasena) => {
    const normalizedUserKey = normalizeLoginKey(usuario);
    const nextPassword = String(nuevaContrasena || "").trim();
    if (!normalizedUserKey || !nextPassword) return false;
    const latestUsers = await loadUsers().catch(() => users);
    const normalizedSource = normalizeUsersList(latestUsers && latestUsers.length ? latestUsers : users);
    const targetUser = normalizedSource.find(u => normalizeLoginKey(u.usuario) === normalizedUserKey);
    if (!targetUser) {
      notify("e","No se encontro el usuario para resetear contrasena.");
      return false;
    }
    const updated = normalizedSource.map(u => normalizeLoginKey(u.usuario) === normalizedUserKey ? {...u, password: nextPassword} : u);
    const saved = await saveUsers(updated);
    if (saved === false) return false;
    setUsers(updated);
    return true;
  };

  const reloadFeedbackRecords = async() => {
    const loaded = await loadFeedbackRecords();
    setFeedbackRecords(loaded);
    return loaded;
  };

  const reloadEvaluationRecords = async() => {
    setEvaluationsLoading(true);
    try {
      const loaded = await loadEvaluationRecords();
      setEvaluationRecords(loaded);
      return loaded;
    } finally {
      setEvaluationsLoading(false);
    }
  };

  const upsertEvaluationInState = (record, baseRecords) => {
    if (!record?.id) return baseRecords || evaluationRecords;
    const source = Array.isArray(baseRecords) ? baseRecords : evaluationRecords;
    const next = [record, ...source.filter(item => String(item?.id) !== String(record.id))];
    next.sort((a,b)=>getDateMs(b?.fechaEvaluacion || b?.updatedAt || b?.createdAt) - getDateMs(a?.fechaEvaluacion || a?.updatedAt || a?.createdAt));
    setEvaluationRecords(next);
    return next;
  };

  const reloadNoTipificationRecords = async() => {
    const loaded = await loadNoTipificationRecords();
    setNoTipificationRecords(loaded);
    return loaded;
  };

function normalizeEvaluationFormType(value){
  const normalized = normalizeComparableValue(value);
  if (["no venta","no_venta","noventa"].includes(normalized)) return "no_venta";
  if (["mala practica","mala_practica","mala practica comercial","cero tolerancia"].includes(normalized)) return "mala_practica";
  return "venta";
}

function buildEvaluationTemplateSection(section){
  return {resultado:"",detalleAuditado:"",oportunidadMejora:"",evidencia:"",puntaje:0,...section};
}

function getDefaultEvaluationSections(formType){
  const type = normalizeEvaluationFormType(formType);
  return (EVALUATION_FORM_TEMPLATES[type] || EVALUATION_FORM_TEMPLATES.venta).map(buildEvaluationTemplateSection);
}

function getAntiguedadBucket(value){
  const months = Number(value || 0) || 0;
  if (months <= 3) return "0-3 meses";
  if (months <= 6) return "4-6 meses";
  if (months <= 12) return "7-12 meses";
  if (months <= 24) return "13-24 meses";
  return "25+ meses";
}

function mergeEvaluationSectionWithTemplate(templateSection, storedSection){
  const result = storedSection && typeof storedSection === "object" ? storedSection : {};
  const explicitResult = result.resultado ?? result.cumplimiento ?? result.estadoCumplimiento ?? result.respuesta ?? result.resultadoItem ?? result.resultadoAtributo ?? result.status;
  let normalizedResult = explicitResult !== undefined && explicitResult !== null && String(explicitResult).trim() !== "" ? explicitResult : templateSection.resultado;
  if ((!normalizedResult || !String(normalizedResult).trim()) && result.puntaje !== undefined && result.puntaje !== null && String(result.puntaje).trim() !== "") {
    const numericScore = Number(result.puntaje);
    const weight = Number(templateSection.pesoSub || result.pesoSub || 0) || 0;
    if (!isNaN(numericScore) && weight > 0) normalizedResult = numericScore >= weight ? "Cumple" : "No cumple";
  }
  return {
    ...result,
    categoria: templateSection.categoria,
    pesoItem: Number(templateSection.pesoItem || 0) || 0,
    nombreSeccion: templateSection.nombreSeccion,
    criterio: templateSection.criterio,
    pesoSub: Number(templateSection.pesoSub || 0) || 0,
    resultado: normalizedResult,
    detalleAuditado: result.detalleAuditado || "",
    oportunidadMejora: result.oportunidadMejora || "",
    evidencia: result.evidencia || "",
    puntaje: result.puntaje !== undefined ? result.puntaje : templateSection.puntaje
  };
}

function normalizeEvaluationSectionsForScoring(secciones, formType){
  const template = getDefaultEvaluationSections(formType);
  const source = Array.isArray(secciones) ? secciones : [];
  return template.map(templateSection => mergeEvaluationSectionWithTemplate(
    templateSection,
    findMatchingEvaluationItem(source, templateSection)
  ));
}

function calculateWeightedEvaluationScore(secciones, formType){
  let applicableWeight = 0;
  let achievedWeight = 0;
  normalizeEvaluationSectionsForScoring(secciones, formType).forEach(section => {
    const weight = Number(section?.pesoSub || 0) || 0;
    const result = normalizeComparableValue(section?.resultado);
    if (!weight || !result || result === "no aplica") return;
    applicableWeight += weight;
    if (result === "cumple") achievedWeight += weight;
  });
  const pct = applicableWeight ? achievedWeight / applicableWeight * 100 : 0;
  const label = pct >= 90 ? "Excelente" : pct >= 80 ? "Cumple" : pct >= 60 ? "En seguimiento" : "Critico";
  return {
    applicableWeight,
    achievedWeight,
    pct,
    label,
    text: `${pct.toFixed(1)}% - ${label}`
  };
}

function extractEvaluationPct(value){
  const match = String(value || "").match(/(\d+(?:\.\d+)?)\s*%/);
  if (match) return Number(match[1]);
  const numericValue = Number(value);
  return !isNaN(numericValue) ? numericValue : 0;
}

function normalizeEvaluationMode(value){
  const normalized = normalizeComparableValue(value);
  return normalized === "ojt" ? "ojt" : "operacion";
}

function isOjtEvaluationRecord(value){
  return normalizeEvaluationMode(value?.evaluationMode || value?.modoEvaluacion || value?.modalidadEvaluacion) === "ojt" ||
    value?.isOjt === true ||
    normalizeComparableValue(value?.campaign || value?.managementTypeRuc || value?.tipoGestionRuc) === "ojt";
}

function buildNoTipificationTrend(noTipificationRows){
  const grouped = grp(noTipificationRows || [], row => getPeriodKey(row.callDateTime || row.createdAt || row.date));
  return Object.entries(grouped).filter(([key])=>!!key).map(([period,rows]) => ({
    period,
    label: formatPeriodLabel(period),
    count: rows.length
  })).sort((a,b)=>String(a.period).localeCompare(String(b.period)));
}

function buildTrendFromEvaluations(evaluations){
  const grouped = grp(evaluations || [], evaluation => getMonthWeekPeriodKey(evaluation?.fechaEvaluacion || evaluation?.updatedAt || evaluation?.createdAt));
  return Object.entries(grouped).filter(([key])=>!!key).map(([period,rows]) => {
    const scores = rows.map(row => {
      const rawScore = row?.resultadoGeneral ?? row?.nota ?? row?.score ?? "";
      if (String(rawScore || "").trim() === "") return null;
      return extractEvaluationPct(rawScore);
    }).filter(value => typeof value === "number" && !isNaN(value));
    return {
      period,
      label: formatPeriodLabel(period),
      score: averageNumeric(scores),
      evaluationCount: scores.length,
      noCumple: 0,
      cumple: 0
    };
  }).filter(item => item.score !== null).sort((a,b)=>String(a.period).localeCompare(String(b.period)));
}

function buildScoreTrendConfig(title, trendRows, options = {}){
  const trend = trendRows || [];
  const labels = trend.map(item => item.label);
  if (!labels.length) return null;
  const basePeriod = options.basePeriod || "";
  const comparedPeriod = options.comparedPeriod || "";
  const baseScore = trend.find(item => item.period === basePeriod)?.score;
  const config = buildLineChartConfig(title || "Tendencia", labels, [
    {
      label: options.datasetLabel || "Promedio ponderado semanal",
      data: trend.map(item => item.score),
      borderColor: options.borderColor || THEME.primary,
      backgroundColor: options.backgroundColor || "rgba(29,43,255,0.12)",
      fill: true,
      tension: 0.35,
      pointBackgroundColor: trend.map(item => item.period === basePeriod ? THEME.accent : item.period === comparedPeriod ? "#19C37D" : THEME.white),
      pointRadius: trend.map(item => item.period === basePeriod || item.period === comparedPeriod ? 5 : 3)
    }
  ]);
  config.options.plugins.tooltip = {
    callbacks: {
      title: items => items?.[0]?.label || "",
      label: context => `Promedio ponderado: ${Number(context.parsed.y || 0).toFixed(2)}%`,
      afterLabel: context => {
        const item = trend[context.dataIndex] || {};
        const lines = [`Cantidad de evaluaciones: ${item.evaluationCount || 0}`];
        if (typeof baseScore === "number" && !isNaN(baseScore) && item.period !== basePeriod) {
          lines.push(`Diferencia vs periodo base: ${formatPointDifference(Number(item.score) - baseScore)}`);
        }
        return lines;
      }
    }
  };
  return config;
}

function buildAdvisorInsight(feedbackRows, sectionRows, noTipificationRows){
  if (!feedbackRows.length) return null;
  const latest = getLatestFeedbackRow(feedbackRows);
  const scoreSeries = buildEvaluationScoreSeries(sectionRows);
  const weeklyTrend = buildTrendByPeriod(sectionRows);
  const firstScore = scoreSeries[0]?.score ?? null;
  const lastScore = scoreSeries[scoreSeries.length - 1]?.score ?? null;
  const delta = firstScore !== null && lastScore !== null ? lastScore - firstScore : null;
  const reincidences = buildReincidenceRows(sectionRows).filter(row => normalizeName(row.advisorName) === normalizeName(latest?.advisorName));
  const recoveredIndicators = buildRecoveredIndicators(sectionRows).filter(row => normalizeName(row.advisorName) === normalizeName(latest?.advisorName));
  const observationCounts = buildObservationCounts(sectionRows);
  const criticalIndicators = buildIndicatorOutcomeCounts(sectionRows).filter(item => item.noCumple > 0);
  const quartile = getQuartileFromScore(lastScore) || latest?.quartile || "";
  const openCommitments = feedbackRows.filter(row => row.compromisoMejora && row.estado !== "closed").length;
  const closedCommitments = feedbackRows.filter(row => row.compromisoMejora && row.estado === "closed").length;
  const advisorNoTipificationRows = (noTipificationRows || []).filter(row => normalizeName(row.advisorName) === normalizeName(latest?.advisorName));
  return {
    advisorName: latest?.advisorName || "-",
    supervisor: latest?.supervisor || "-",
    coordinador: latest?.coordinador || "-",
    antiguedad: latest?.antiguedad || 0,
    campaign: latest?.campaign || "-",
    managementTypeRuc: latest?.managementTypeRuc || latest?.campaign || "-",
    fechaIngreso: latest?.fechaIngreso || "-",
    quartile,
    quartileColor: getQuartileColor(quartile),
    evaluationCount: feedbackRows.length,
    feedbackCount: getManagementCounter(feedbackRows, "Feedback"),
    reinforcementCount: getManagementCounter(feedbackRows, "Refuerzo"),
    clinicCount: getManagementCounter(feedbackRows, "Clinica de calidad"),
    badPracticeCount: getManagementCounter(feedbackRows, "Mala practica"),
    latestFeedbackDate: latest?.feedbackDate || "",
    currentStatus: latest?.estado || "pending",
    currentStatusLabel: getStatusLabel(latest?.estado),
    scoreSeries,
    weeklyTrend,
    firstScore,
    lastScore,
    delta,
    reincidences,
    recoveredIndicators,
    criticalIndicators,
    observationCounts,
    openCommitments,
    closedCommitments,
    noTipificationCount: advisorNoTipificationRows.length,
    noTipificationRows: advisorNoTipificationRows
  };
}

function buildAdvisorTableRows(feedbackRows, sectionRows, noTipificationRows){
  const byAdvisor = grp(feedbackRows || [], row => normalizeName(row.advisorName));
  return Object.values(byAdvisor).map(rows => {
    const advisorName = rows[0]?.advisorName || "-";
    const advisorSections = (sectionRows || []).filter(section => normalizeName(section.advisorName) === normalizeName(advisorName));

}

const EVALUATION_DETAIL_ARRAY_KEYS = ["secciones","detalles","items","respuestas","atributos","checklist","preguntas","criterios"];
const RESULT_FIELD_KEYS = ["resultado","cumplimiento","estadoCumplimiento","estado","respuesta","valor","calificacion","resultadoItem","resultadoAtributo","evaluacion","status"];
const ATTRIBUTE_FIELD_KEYS = ["atributo","atributoCalidad","item","itemCalidad","criterio","pregunta","nombreAtributo","factor","categoria","dimension","nombreSeccion","subItem","indicador"];

function pickFirstFieldValue(source, keys){
  if (!source) return "";
  for (const key of keys) {
    if (source[key] !== undefined && source[key] !== null && String(source[key]).trim() !== "") return source[key];
  }
  return "";
}

function collectEvaluationDetailItems(evaluation){
  const items = [];
  const addItems = (values, sourceKey) => {
    if (!Array.isArray(values)) return;
    values.forEach((item,index) => {
      if (!item || typeof item !== "object") return;
      items.push({...item,_sourceKey:sourceKey,_sourceIndex:index});
    });
  };

  EVALUATION_DETAIL_ARRAY_KEYS.forEach(key => addItems(evaluation?.[key], key));
  ["evaluacion","detalle","data","payload"].forEach(parentKey => {
    const parent = evaluation?.[parentKey];
    if (!parent || typeof parent !== "object") return;
    EVALUATION_DETAIL_ARRAY_KEYS.forEach(key => addItems(parent?.[key], `${parentKey}.${key}`));
  });

  const seen = new Set();
  return items.filter(item => {
    const fingerprint = [
      pickFirstFieldValue(item, ATTRIBUTE_FIELD_KEYS),
      pickFirstFieldValue(item, RESULT_FIELD_KEYS),
      item._sourceKey,
      item._sourceIndex
    ].join("||");
    if (seen.has(fingerprint)) return false;
    seen.add(fingerprint);
    return true;
  });
}

function buildImprovementDataset({currentUser,feedbackRecords,evaluationRecords,noTipificationRecords,staffing,historico,users}){
  const quartileLookup = getQuartileLookup(historico);
  const feedbackById = {};
  (feedbackRecords || []).forEach(item => {
    if (item?.id) feedbackById[String(item.id)] = item;
  });

  const currentSupervisorCanSeeRecord = record => {
    const assignedUser = String(record?.supervisorUser || record?.supervisorId || "").trim().toLowerCase();
    if (assignedUser) return assignedUser === String(currentUser?.usuario || "").trim().toLowerCase();
    const assignedName = record?.supervisorName || record?.supervisor || "";
    return String(assignedName || "").trim() ? isSupervisorIdentityMatch(currentUser, assignedName) : false;
  };

  const canSeeAdvisor = (advisorName, linkedFeedback = null) => {
    const role = String(currentUser?.rol || "").trim().toLowerCase();
    if (["admin","analista","formador"].includes(role)) return true;
    if (role === "supervisor") {
      return true;
    }
    return false;
  };

  const buildBaseRow = (evaluation) => {
    const linkedFeedback = evaluation?.feedbackId ? feedbackById[String(evaluation.feedbackId)] || null : null;
    const advisorName = evaluation?.asesorNombre || linkedFeedback?.asesorNombre || linkedFeedback?.assessor || "-";
    const staffingItem = (staffing || []).find(item => normalizeName(item?.asesor) === normalizeName(advisorName));
    const isOjt = isOjtEvaluationRecord(evaluation);
    const campaign = isOjt ? "OJT" : (evaluation?.campaign || linkedFeedback?.campaign || staffingItem?.tipoGestionRuc || staffingItem?.campaign || "");
    const score = extractEvaluationPct(evaluation?.resultadoGeneral);
    const historicalQuartile = quartileLookup[normalizeName(advisorName)] || {};
    const quartile = getQuartileFromScore(score) || historicalQuartile.quartile || "";
    return {
      ...(linkedFeedback || {}),
      id: `evaluation-${evaluation.id}`,
      sourceType: "evaluation",
      evaluationMode: isOjt ? "ojt" : "operacion",
      isOjt,
      advisorName,
      supervisor: isOjt ? "OJT" : (staffingItem?.supervisor || ""),
      coordinador: isOjt ? (evaluation?.formadorNombre || "") : (staffingItem?.coordinador || ""),
      antiguedad: Number(staffingItem?.antiguedad || 0) || 0,
      fechaIngreso: staffingItem?.fechaIngreso || "",
      managementTypeRuc: campaign || "",
      campaign,
      evaluation,
      estado: linkedFeedback?.estado || linkedFeedback?.status || (evaluation?.estadoEvaluacion === "closed" ? "closed" : "in_follow_up"),
      feedbackDate: evaluation?.fechaEvaluacion || linkedFeedback?.feedbackDate || evaluation?.createdAt || "",
      score,
      quartile,
      quartileScore: score ?? historicalQuartile.score,
      lastActionDate: evaluation?.updatedAt || linkedFeedback?.updatedAt || evaluation?.fechaEvaluacion || "",
      closedAt: evaluation?.updatedAt || linkedFeedback?.updatedAt || "",
      compromisoMejora: linkedFeedback?.compromisoMejora || "",
      observacionGeneral: linkedFeedback?.observacionGeneral || linkedFeedback?.feedbackText || "",
      tipoGestion: isOjt ? "Evaluacion OJT" : (linkedFeedback?.tipoGestion || linkedFeedback?.feedbackCategory || "Evaluacion de calidad"),
      formadorNombre: evaluation?.formadorNombre || ""
    };
  };

  const visibleEvaluationRecords = getVisibleEvaluationRecords(currentUser, staffing, evaluationRecords);
  const evaluationFeedbackRows = visibleEvaluationRecords
    .filter(evaluation => {
      const linkedFeedback = evaluation?.feedbackId ? feedbackById[String(evaluation.feedbackId)] || null : null;
      return canSeeAdvisor(evaluation?.asesorNombre, linkedFeedback);
    })
    .map(buildBaseRow);
  const evaluationFeedbackIds = new Set(visibleEvaluationRecords.map(item => String(item?.feedbackId || "")).filter(Boolean));
  const feedbackOnlyRows = (feedbackRecords || [])
    .filter(record => !evaluationFeedbackIds.has(String(record?.id || "")))
    .filter(record => canSeeAdvisor(record?.asesorNombre || record?.assessor, record))
    .map(record => {
      const advisorName = record?.asesorNombre || record?.assessor || "-";
      const staffingItem = (staffing || []).find(item => normalizeName(item?.asesor) === normalizeName(advisorName));
      const campaign = record?.campaign || staffingItem?.tipoGestionRuc || staffingItem?.campaign || "";
      const score = extractEvaluationPct(record?.resultadoGeneral);
      const historicalQuartile = quartileLookup[normalizeName(advisorName)] || {};
      return {
        ...record,
        id: `feedback-${record.id || advisorName}`,
        sourceType: "feedback",
        evaluationMode: "feedback",
        isOjt: false,
        advisorName,
        supervisor: record?.supervisor || staffingItem?.supervisor || "",
        coordinador: record?.coordinador || staffingItem?.coordinador || "",
        antiguedad: Number(record?.antiguedad || staffingItem?.antiguedad || 0) || 0,
        fechaIngreso: record?.fechaIngreso || staffingItem?.fechaIngreso || "",
        managementTypeRuc: campaign || "",
        campaign,
        evaluation: null,
        estado: record?.estado || record?.status || "pending",
        feedbackDate: record?.feedbackDate || record?.createdAt || "",
        score,
        quartile: historicalQuartile.quartile || getQuartileFromScore(score) || "",
        quartileScore: score ?? historicalQuartile.score,
        lastActionDate: record?.updatedAt || record?.advisorAcceptedAt || record?.fechaVisualizacionAsesor || record?.feedbackDate || record?.createdAt || "",
        closedAt: record?.updatedAt || "",
        compromisoMejora: record?.compromisoMejora || "",
        observacionGeneral: record?.observacionGeneral || record?.feedbackText || "",
        tipoGestion: record?.tipoGestion || record?.feedbackCategory || "Feedback",
        formadorNombre: ""
      };
    });
  const allFeedbackRows = evaluationFeedbackRows.concat(feedbackOnlyRows);
  const sectionRows = [];
  allFeedbackRows.forEach(row => {
    const sections = collectEvaluationDetailItems(row.evaluation);
    const effectiveSections = sections.length ? sections : buildSyntheticSectionsFromEvaluation(row);
    effectiveSections.forEach((section,index) => {
      const rawResult = pickFirstFieldValue(section, RESULT_FIELD_KEYS);
      const attributeName = pickFirstFieldValue(section, ATTRIBUTE_FIELD_KEYS) || `Seccion ${index + 1}`;
      sectionRows.push({
        feedbackId: String(row.id),
        evaluationId: row.evaluation?.id || `feedback-${row.id}`,
        advisorName: row.advisorName,
        supervisor: row.supervisor,
        coordinador: row.coordinador,
        antiguedad: row.antiguedad,
        managementTypeRuc: row.managementTypeRuc,
        campaign: row.campaign,
        fechaIngreso: row.fechaIngreso,
        quartile: row.quartile,
        tipoGestion: row.tipoGestion,
        clasificacionFeedback: row.clasificacionFeedback || "",
        tipoRefuerzo: row.tipoRefuerzo || "",
        estado: row.estado,
        date: row.evaluation?.fechaEvaluacion || row.feedbackDate || row.createdAt || "",
        finalScore: row.score,
        indicador: attributeName,
        criterio: pickFirstFieldValue(section, ["criterio","pregunta","item","itemCalidad","atributo","nombreSeccion"]) || "",
        resultado: normalizeResultValue(rawResult),
        resultadoRaw: rawResult,
        sourceKey: section._sourceKey || "",
        availableFields: Object.keys(section || {}),
        detalleAuditado: section.detalleAuditado || "",
        oportunidadMejora: section.oportunidadMejora || "",
        evidencia: section.evidencia || "",
        puntaje: Number(section.puntaje || 0) || 0,
        pesoSub: Number(section.pesoSub || 0) || 0,
        syntheticGeneral: section.syntheticGeneral === true
      });
    });
  });

  const noTipificationRows = (noTipificationRecords || [])
    .filter(item => canSeeAdvisor(item?.asesorNombre))
    .map(item => {
      const advisorName = item?.asesorNombre || "-";
      const staffingItem = (staffing || []).find(entry => normalizeName(entry?.asesor) === normalizeName(advisorName));
      return {
        ...item,
        advisorName,
        supervisor: item?.supervisor || staffingItem?.supervisor || "",
        coordinador: item?.coordinador || staffingItem?.coordinador || "",
        antiguedad: Number(item?.antiguedad || staffingItem?.antiguedad || 0) || 0,
        fechaIngreso: item?.fechaIngreso || staffingItem?.fechaIngreso || "",
        managementTypeRuc: item?.managementTypeRuc || staffingItem?.tipoGestionRuc || "",
        quartile: quartileLookup[normalizeName(advisorName)]?.quartile || ""
      };
    });

  if (typeof console !== "undefined") {
    console.info("[EVALUACIONES_TRANSFORMADAS]", "Transformacion dashboard", {
      evaluacionesRecibidas: Array.isArray(evaluationRecords) ? evaluationRecords.length : 0,
      feedbacksRecibidos: Array.isArray(feedbackRecords) ? feedbackRecords.length : 0,
      noTipificacionRecibidos: Array.isArray(noTipificationRecords) ? noTipificationRecords.length : 0,
      staffingRecibidos: Array.isArray(staffing) ? staffing.length : 0,
      evaluacionesTransformadas: allFeedbackRows.length,
      detalleTransformado: sectionRows.length,
      noTipificacionTransformada: noTipificationRows.length,
      muestraEvaluaciones: (evaluationRecords || []).slice(0, 5).map(item => ({
        id: item?.id,
        asesorNombre: item?.asesorNombre,
        fechaEvaluacion: item?.fechaEvaluacion,
        resultadoGeneral: item?.resultadoGeneral,
        estadoEvaluacion: item?.estadoEvaluacion
      }))
    });
  }

  return {feedbackRows:allFeedbackRows, sectionRows, noTipificationRows};
}

function normalizeHistoryEvaluationRecord(evaluation){
  if (!evaluation || typeof evaluation !== "object") return null;
  const asesor = getEvaluationAdvisorName(evaluation);
  const idEvaluacion = getEvaluationHistoryId(evaluation);
  if (!idEvaluacion && !asesor) return null;
  const campaign = getHistoryFieldValue(evaluation, ["campaign","campana","campaña","managementTypeRuc","tipoGestionRuc"]);
  const tipoGestion = getHistoryFieldValue(evaluation, ["tipoGestion","tipo_gestion","gestion","feedbackCategory"]) || campaign;
  const nota = getHistoryFieldValue(evaluation, ["resultadoGeneral","nota","score","puntaje","calificacion"]);
  const resultado = getHistoryFieldValue(evaluation, ["resultado","resultadoFinal","estadoResultado","clasificacion"]) || nota;
  const fecha = getHistoryFieldValue(evaluation, ["fechaEvaluacion","fecha","feedbackDate","createdAt","updatedAt"]);
  return {
    ...evaluation,
    id: evaluation.id || idEvaluacion,
    idEvaluacion,
    evaluacionId: evaluation.evaluacionId || idEvaluacion,
    fecha,
    fechaEvaluacion: fecha,
    asesor,
    asesorNombre: asesor,
    supervisor: getHistoryFieldValue(evaluation, ["supervisor","jefe","leader"]),
    coordinador: getHistoryFieldValue(evaluation, ["coordinador","coordinator"]),
    campaign,
    tipoGestion,
    nota,
    resultado,
    resultadoGeneral: nota || resultado,
    estado: getHistoryFieldValue(evaluation, ["estado","estadoEvaluacion","status"]),
    estadoEvaluacion: getHistoryFieldValue(evaluation, ["estadoEvaluacion","estado","status"]),
    detalleAuditado: getHistoryFieldValue(evaluation, ["detalleAuditado","detalleAuditadoGeneral","detalle","observacionGeneral"]),
    detalleAuditadoGeneral: getHistoryFieldValue(evaluation, ["detalleAuditadoGeneral","detalleAuditado","detalle","observacionGeneral"]),
    oportunidadMejora: getHistoryFieldValue(evaluation, ["oportunidadMejora","oportunidadMejoraGeneral","compromisoMejora"]),
    oportunidadMejoraGeneral: getHistoryFieldValue(evaluation, ["oportunidadMejoraGeneral","oportunidadMejora","compromisoMejora"]),
    referenciaEvidencia: getHistoryFieldValue(evaluation, ["referenciaEvidencia","evidenciaGeneral","evidencia","referencia"]),
    evidenciaGeneral: getHistoryFieldValue(evaluation, ["evidenciaGeneral","referenciaEvidencia","evidencia","referencia"]),
    audioLlamadaUrl: getHistoryFieldValue(evaluation, HISTORY_AUDIO_FIELD_KEYS),
    imagenEvidenciaUrl: getHistoryFieldValue(evaluation, HISTORY_IMAGE_FIELD_KEYS),
    driveFolderEvaluacionUrl: getHistoryFieldValue(evaluation, ["driveFolderEvaluacionUrl","driveFolderUrl","folderUrl","carpetaDriveUrl"]),
    fuente: evaluation.fuente || evaluation.source || ""
  };
}

function getAdvisorEvaluationHistory(evaluationRecords, advisorName){
  const selectedNormalized = normalizeName(advisorName);
  const normalizedRows = (evaluationRecords || []).map(normalizeHistoryEvaluationRecord).filter(Boolean);
  const byId = new Map();
  normalizedRows.forEach(row => {
    const key = String(row.idEvaluacion || row.id || "").trim();
    if (!key) return;
    const existing = byId.get(key);
    if (!existing || normalizeComparableValue(row.fuente).includes("firebase")) {
      byId.set(key, {...existing,...row});
    }
  });
  const uniqueRows = [...byId.values()];
  const filteredRows = uniqueRows
    .filter(item => normalizeName(getEvaluationAdvisorName(item)) === selectedNormalized)
    .sort((a,b)=>getDateMs(b?.fechaEvaluacion || b?.createdAt) - getDateMs(a?.fechaEvaluacion || a?.createdAt));
  if (typeof console !== "undefined") {
    console.info("[HISTORIAL_ASESOR_SELECTED]", {asesorSeleccionado: advisorName, asesorNormalizado: selectedNormalized});
    console.info("[HISTORIAL_DATA_SOURCE]", {
      totalEvaluacionesDisponibles: Array.isArray(evaluationRecords) ? evaluationRecords.length : 0,
      totalNormalizadas: normalizedRows.length,
      totalUnicas: uniqueRows.length,
      camposMuestra: Object.keys((evaluationRecords || [])[0] || {}),
      muestraAsesores: uniqueRows.slice(0, 10).map(item => getEvaluationAdvisorName(item))
    });
    console.info("[HISTORIAL_FILTER]", {
      asesorSeleccionado: advisorName,
      asesorNormalizado: selectedNormalized,
      camposAsesorEvaluados: HISTORY_ADVISOR_FIELD_KEYS,
      cantidadDespuesFiltro: filteredRows.length
    });
    console.info("[HISTORIAL_RESULT]", {
      ids: filteredRows.map(item => item.idEvaluacion || item.id).slice(0, 30),
      cantidad: filteredRows.length,
      fuentes: [...new Set(filteredRows.map(item => item.fuente || "sin_fuente"))]
    });
    if (!filteredRows.length) {
      console.info("[HISTORIAL_EMPTY_STATE]", {
        motivo: "No hay evaluaciones cuyo asesor normalizado coincida con el asesor seleccionado.",
        asesorSeleccionado: advisorName,
        asesorNormalizado: selectedNormalized,
        asesoresDisponiblesMuestra: uniqueRows.slice(0, 20).map(item => ({
          asesor: getEvaluationAdvisorName(item),
          normalizado: normalizeName(getEvaluationAdvisorName(item)),
          id: item.idEvaluacion || item.id
        }))
      });
    }
  }
  return filteredRows;
}

function applyImprovementFilters(dataset, filters){
  const sameOption = (left, right) => normalizeComparableValue(left) === normalizeComparableValue(right);
  const sectionRowsBeforeFilters = dataset.sectionRows || [];
  const sectionRowsAfterDate = sectionRowsBeforeFilters.filter(row => isWithinDateRange(row.date, filters.dateFrom, filters.dateTo));
  const matchRow = row => {
    if (!isWithinDateRange(row.feedbackDate || row.callDateTime || row.date || row.lastActionDate || row.createdAt, filters.dateFrom, filters.dateTo)) return false;
    if (filters.advisor && !sameOption(row.advisorName, filters.advisor)) return false;
    if (filters.antiguedadBucket && getAntiguedadBucket(row.antiguedad) !== filters.antiguedadBucket) return false;
    if (filters.supervisor && !sameOption(row.supervisor, filters.supervisor)) return false;
    if (filters.coordinador && !sameOption(row.coordinador, filters.coordinador)) return false;
    if (filters.managementTypeRuc && !sameOption(row.managementTypeRuc, filters.managementTypeRuc)) return false;
    return true;
  };
  const filteredFeedbackRows = (dataset.feedbackRows || []).filter(matchRow);
  const filteredNoTipificationRows = (dataset.noTipificationRows || []).filter(matchRow);
  const feedbackIds = new Set(filteredFeedbackRows.map(row => String(row.id)));
  const filteredSectionRows = (dataset.sectionRows || []).filter(row => feedbackIds.has(String(row.feedbackId)) && isWithinDateRange(row.date, filters.dateFrom, filters.dateTo));
  if (typeof console !== "undefined") {
    console.info("[FILTROS_EVALUACIONES]", {
      feedbackRowsAntes: (dataset.feedbackRows || []).length,
      feedbackRowsDespues: filteredFeedbackRows.length,
      noTipificacionAntes: (dataset.noTipificationRows || []).length,
      noTipificacionDespues: filteredNoTipificationRows.length,
      totalSectionRows: sectionRowsBeforeFilters.length,
      sectionRowsDespuesFecha: sectionRowsAfterDate.length,
      sectionRowsDespuesFiltros: filteredSectionRows.length,
      filtros: {...filters},
      fechasMuestra: getUniqueSample(sectionRowsBeforeFilters.map(row => row.date), 12)
    });
  }
  return {feedbackRows:filteredFeedbackRows, sectionRows:filteredSectionRows, noTipificationRows:filteredNoTipificationRows};
}

    }));

  const uploadEvaluationAttachmentsInBackground = async(savedEvaluation, payload, pendingEvidenceFiles, pendingAudioFiles, closeAfterSave, startedAt) => {

          throw error;
        }
      }));
      const successful = uploadResults.filter(result => result.status === "fulfilled" && result.value).map(result => result.value);
      const failed = uploadResults.map((result,index) => ({result,job:fileJobs[index]})).filter(entry => entry.result.status === "rejected");
      logSaveSpeed("[SAVE_SPEED_DRIVE_FOLDER_DONE]", attachmentStartedAt, {
        idEvaluacion: savedEvaluation.id,
        attachmentsUploaded: successful.length,
        attachmentsFailed: failed.length,
        note: "adjuntos_procesados_independientemente"
      });
      const latestEvaluation = successful.length
        ? successful.slice().sort((left,right) => (Array.isArray(right?.files) ? right.files.length : 0) - (Array.isArray(left?.files) ? left.files.length : 0))[0]
        : savedEvaluation;
      if (latestEvaluation) applySavedEvaluationToModal(latestEvaluation);
      if (failed.length) {
        const errorMessage = failed.map(entry => entry.result.reason?.message || "Error de conexion al subir adjunto.").join(" | ");
        try {
          const pendingUpdate = await markEvaluationAttachmentsPendingEntry({
            id:savedEvaluation.id,
            currentUser,

          });

        notify("e","La evaluacion fue registrada, pero hubo un problema de conexion al subir los adjuntos. Se marcaron como pendientes para reintento.");

const CALIBRATION_STATUS_LABEL = {
  draft: "Borrador",
  scheduled: "Programada",
  live: "En vivo",
  finalized: "Finalizada",
  closed_results: "Cerrada con resultados",
  annulled: "Anulada"
};

function normalizeCalibrationStatus(value){
  const normalized = normalizeComparableValue(value);
  if (["borrador","draft"].includes(normalized)) return "draft";
  if (["programada","scheduled"].includes(normalized)) return "scheduled";
  if (["en vivo","live"].includes(normalized)) return "live";
  if (["finalizada","finalized"].includes(normalized)) return "finalized";
  if (["cerrada con resultados","closed","closed results","closed_results"].includes(normalized)) return "closed_results";
  if (["anulada","annulled","cancelled","canceled"].includes(normalized)) return "annulled";
  return "draft";
}

function getCalibrationAudioFile(session){
  return session?.audio_file || session?.audioFile || (Array.isArray(session?.files) ? session.files.find(isAudioAttachment) : null) || null;
}

function getCalibrationVisibleSessions(sessions, currentUser){
  const role = String(currentUser?.rol || "").trim().toLowerCase();
  const userId = String(currentUser?.usuario || "").trim();
  if (["admin","analista"].includes(role)) return sessions || [];
  return (sessions || []).filter(session =>
    String(session?.expert_referent_id || "") === userId ||
    (session?.participants || []).some(item => String(item?.user_id || "") === userId)
  );
}

function getCalibrationSessionMetrics(session){
  const participants = session?.participants || [];
  const evaluations = session?.evaluations || [];
  const submitted = evaluations.filter(item => item.submitted);
  const expertSubmitted = evaluations.some(item => item.is_expert_referent && item.submitted);
  const results = session?.results || [];
  const avgAffinity = averageNumeric(results.map(item => Number(item.affinity_percentage)));
  const status = normalizeCalibrationStatus(session?.status);
  const submittedUsers = new Set(submitted.map(item => String(item.user_id || "")));
  const submittedCount = participants.filter(item => submittedUsers.has(String(item.user_id || ""))).length;
  return {
    participantsCount: participants.length,
    submittedCount,
    participantSubmittedCount: submitted.filter(item => !item.is_expert_referent).length,
    pendingCount: Math.max(0, participants.length - submittedCount),
    expertSubmitted,
    avgAffinity: avgAffinity || 0,
    hasResults: results.length > 0,
    canShowResults: status === "closed_results" && results.length > 0
  };
}

function buildCalibrationDashboardRows(sessions){
  const rows = sessions || [];
  const closed = rows.filter(session => normalizeCalibrationStatus(session.status) === "closed_results");
  const results = rows.flatMap(session => normalizeCalibrationStatus(session.status) === "closed_results" ? (session.results || []) : []);
  const avgAffinity = averageNumeric(results.map(item => Number(item.affinity_percentage))) || 0;
  const byStatus = grp(rows, session => CALIBRATION_STATUS_LABEL[normalizeCalibrationStatus(session.status)] || "Borrador");
  const byArea = Object.entries(grp(results, item => item.area || "Sin area")).map(([label,rows]) => ({label,value:averageNumeric(rows.map(row => Number(row.affinity_percentage))) || 0}));
  const byRole = Object.entries(grp(results, item => ROL_LABEL[item.role] || item.role || "Sin rol")).map(([label,rows]) => ({label,value:averageNumeric(rows.map(row => Number(row.affinity_percentage))) || 0}));
  const ranked = [...results].sort((a,b)=>Number(b.affinity_percentage || 0)-Number(a.affinity_percentage || 0));
  const evaluations = rows.flatMap(session => session.evaluations || []);
  const participantRows = rows.flatMap(session => {
    const evaluationsByUser = new Map((session.evaluations || []).map(item => [String(item.user_id || ""), item]));
    const resultsByUser = new Map((session.results || []).map(item => [String(item.user_id || ""), item]));
    return (session.participants || []).map(participant => {
      const evaluation = evaluationsByUser.get(String(participant.user_id || "")) || null;
      const result = resultsByUser.get(String(participant.user_id || "")) || null;
      const isExpert = String(participant.user_id || "") === String(session.expert_referent_id || "") || Boolean(participant.is_expert_referent);
      const status = normalizeCalibrationStatus(session.status);
      return {
        id: `${session.id}_${participant.user_id}`,
        session_id: session.id,
        session_title: session.title || "Calibracion sin nombre",
        session_status: status,
        user_id: participant.user_id,
        user_name: participant.user_name || participant.nombre || participant.user_id || "-",
        role: participant.role || "",
        area: participant.area || "",
        is_expert_referent: isExpert,
        participation_status: participant.participation_status || (evaluation?.submitted ? "submitted" : "pending"),
        submitted_at: participant.submitted_at || evaluation?.submitted_at || "",
        total_score: evaluation?.total_score,
        affinity_percentage: result?.affinity_percentage,
        calibration_level: isExpert ? "Patron oficial" : result?.calibration_level || (status === "closed_results" ? "Sin envio / sin resultado" : "Pendiente de cierre"),
        main_differences: result?.main_differences || []
      };
    });
  });
  const expertRows = rows.map(session => ({
    id: `${session.id}_${session.expert_referent_id || "expert"}`,
    session_id: session.id,
    session_title: session.title || "Calibracion sin nombre",
    expert_referent_id: session.expert_referent_id || "",
    expert_referent_name: session.expert_referent_name || "-",
    status: normalizeCalibrationStatus(session.status),
    submitted: (session.evaluations || []).some(item => item.is_expert_referent && item.submitted)
  }));
  const comparisonRows = rows.flatMap(session => (session.comparisonRows || []).map(row => ({...row,sessionTitle:session.title || "Calibracion sin nombre",sessionStatus:normalizeCalibrationStatus(session.status)})));
  return {closed,results,avgAffinity,byStatus,byArea,byRole,ranked,evaluations,participantRows,expertRows,comparisonRows};
}

function CalibrationModule({currentUser,users,notify}){
  const [data,setData] = useState({sessions:[]});
  const [loading,setLoading] = useState(true);
  const [tab,setTab] = useState("live");
  const [modalOpen,setModalOpen] = useState(false);
  const [editingSession,setEditingSession] = useState(null);
  const [roomSession,setRoomSession] = useState(null);
  const [detailSession,setDetailSession] = useState(null);
  const reload = async() => { setLoading(true); const loaded = await loadCalibrationData(currentUser); setData(loaded || {sessions:[]}); setLoading(false); return loaded; };
  useEffect(()=>{ reload(); },[currentUser?.usuario]);
  const sessions = getCalibrationVisibleSessions(data.sessions || [], currentUser);
  const saveSession = async(payload) => { const saved = await saveCalibrationSessionEntry(payload); await reload(); return saved; };
  const changeStatus = async(session,status) => { try{ await updateCalibrationStatusEntry({id:session.id,status,currentUser}); notify("s","Estado actualizado."); await reload(); }catch(err){ notify("e",err?.message || "No se pudo actualizar el estado."); } };
  const submitEvaluation = async(payload) => { const saved = await submitCalibrationEvaluationEntry(payload); await reload(); return saved; };
  if (roomSession) {
    const refreshed = sessions.find(item => item.id === roomSession.id) || roomSession;
    return h(CalibrationEvaluationRoom,{session:refreshed,currentUser,onSubmit:submitEvaluation,notify,onBack:()=>setRoomSession(null)});
  }
  if (detailSession) {
    const refreshed = sessions.find(item => item.id === detailSession.id) || detailSession;
    return h(CalibrationDetailView,{session:refreshed,currentUser,onBack:()=>setDetailSession(null),onEnterRoom:()=>{setRoomSession(refreshed);setDetailSession(null);},onChangeStatus:changeStatus,onExportReport:exportReport});
  }
  function exportReport(session) {
    const rows = (session.results || []).map(item => ({calibracion:session.title,participante:item.user_name,rol:item.role,area:item.area,afinidad:item.affinity_percentage,nivel:item.calibration_level,desviacion:item.score_deviation,diferencias:(item.main_differences || []).join(" | ")}));
    exportCSV(rows.length ? rows : [{calibracion:session.title,estado:CALIBRATION_STATUS_LABEL[normalizeCalibrationStatus(session.status)]}],"reporte_calibracion");

      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:14}},[
        ["Tipo",EVALUATION_FORM_TYPES[normalizeEvaluationFormType(session.evaluation_type)]?.label || "-"],
        ["Referente",session.expert_referent_name || "-"],
        ["Participantes",metrics.participantsCount],
        ["Enviados",metrics.submittedCount],

        ["Afinidad prom.",resultsOpen ? `${metrics.avgAffinity.toFixed(1)}%` : "Oculto"]
      ].map(([label,value])=>h("div",{key:label},h("div",{style:{fontSize:10,color:"#8b92a5",textTransform:"uppercase",fontWeight:800,letterSpacing:"0.1em",marginBottom:5}},label),h("div",{style:{fontSize:13,color:"#fff",fontWeight:800}},value)))),

class AppErrorBoundary extends React.Component {
  constructor(props){
    super(props);
    this.state = {error:null};
  }
  static getDerivedStateFromError(error){
    return {error};
  }
  componentDidCatch(error, info){
    console.error("Error al cargar la aplicacion:", error, info);
  }
  render(){
    if (this.state.error) {
      const message = this.state.error?.message || String(this.state.error || "Error desconocido");
      return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,background:THEME.bg,color:THEME.text}},
        h("div",{style:{...CARD,maxWidth:680,width:"100%",borderTop: `4px solid ${THEME.accent}`}},
          h("div",{style:{fontSize:24,fontWeight:800,color:"#fff",marginBottom:10}},"No se pudo cargar la plataforma"),
          h("div",{style:{fontSize:13,color:"#cbd5e1",lineHeight:1.7,marginBottom:16}},"Se detecto un error durante el inicio. La pantalla ya no quedara en blanco; usa este mensaje para corregir rapido el origen."),
          h("pre",{style:{background:"rgba(9,9,17,0.92)",border: `1px solid ${THEME.border}`,borderRadius:12,padding:14,color:THEME.accent,fontSize:12,whiteSpace:"pre-wrap",overflowX:"auto"}},message),
          h("button",{style:{...BTN("p"),marginTop:16},onClick:()=>location.reload()},"RECARGAR")
        )
      );
    }
    return this.props.children;
  }
}

window.onerror = function(message, source, lineno, colno, error){
  const root = document.getElementById("root");
  if (!root || root.childNodes.length) return false;
  const safeMessage = String(message || error || "Error desconocido")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
  root.innerHTML =
    '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#0B0B12;color:#F3F0E8;font-family:Inter,sans-serif;">' +
    '<div style="max-width:680px;width:100%;background:#17182A;border:1px solid rgba(117,92,255,.22);border-top:4px solid #E600A8;border-radius:20px;padding:28px;">' +
    '<div style="font-size:24px;font-weight:800;margin-bottom:10px;">No se pudo cargar la plataforma</div>' +
    '<div style="font-size:13px;color:#cbd5e1;line-height:1.7;margin-bottom:16px;">Error de inicio detectado.</div>' +
    '<pre style="white-space:pre-wrap;color:#E600A8;background:#090911;border-radius:12px;padding:14px;">' + safeMessage + '</pre>' +
    '<button onclick="location.reload()" style="margin-top:16px;background:linear-gradient(135deg,#1D2BFF,#5B1FD6,#E600A8);color:#fff;border:none;border-radius:14px;padding:12px 20px;font-weight:800;cursor:pointer;">RECARGAR</button>' +
    '</div></div>';
  return false;
};
